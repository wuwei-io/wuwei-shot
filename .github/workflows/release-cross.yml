name: release-cross

# 从单台 Linux 跑机交叉发布并打成各平台标准分发包：
#   Windows .exe / macOS .app(zip) / Linux .AppImage
# 作为正式版 v2.0.0（Latest）发布。
on:
  workflow_dispatch:
  push:
    tags: ['cross-v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish all platforms
        run: |
          set -e
          for rid in win-x64 osx-arm64 osx-x64 linux-x64; do
            echo "== publishing $rid =="
            dotnet publish cross/AltSnip.Desktop.csproj -c Release -r $rid \
              --self-contained true -p:PublishSingleFile=true \
              -p:IncludeNativeLibrariesForSelfExtract=true -o out/$rid
          done

      - name: Package (Windows exe / macOS .app zip / Linux AppImage)
        run: bash scripts/package.sh

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.0
          target_commitish: cross-platform
          name: AltSnip v2.0.0 — cross-platform (Windows / macOS / Linux)
          prerelease: false
          make_latest: 'true'
          files: dist/*
          body: |
            The **cross-platform AltSnip** — one codebase (Avalonia + SkiaSharp) for
            **Windows, macOS, and Linux**. Feature-complete: capture, move/resize the box,
            arrow / line / rectangle / text (IME) / mosaic, colors & thickness, copy, and
            save-as-PNG. Tray icon triggers a capture on every OS; global `Alt + A` works
            on Windows (and X11 Linux).

            ### Downloads
            - **Windows** — `AltSnip-Windows-x64.exe`. Run it (tray icon), press `Alt + A`. ✅ tested.
            - **macOS** — `AltSnip-macOS-arm64.zip` (Apple silicon) / `-x64.zip` (Intel).
              Unzip, then right-click ▸ Open the app (unsigned); needs Screen Recording
              permission. ⚠️ not yet tested on real hardware.
            - **Linux** — `AltSnip-Linux-x64.AppImage`. `chmod +x`, double-click or run.
              Needs `grim`/`scrot` for capture and `wl-copy`/`xclip` for clipboard.
              ⚠️ not yet tested on real hardware.

            > Want the **ultra-light Windows-only** build? The classic single ~50 KB `.exe`
            > is at [v1.4.3](../../releases/tag/v1.4.3).

            macOS/Linux feedback welcome — see [cross/README.md](../../blob/master/cross/README.md).
